<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bless Vegs</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #111;
    }

    header {
      background: #14532d;
      color: #fff;
      padding: 18px 15px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      display: block;
      background: #eee;
    }

    .title {
      font-weight: bold;
      margin-top: 10px;
      font-size: 18px;
    }

    .price {
      color: #14532d;
      font-weight: bold;
      margin-top: 6px;
    }

    .ref {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .options {
      margin-top: 10px;
    }

    .options button {
      margin: 3px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      cursor: pointer;
      background: #fff;
    }

    .options button.active {
      background: #14532d;
      color: #fff;
      border-color: #14532d;
    }

    .total {
      margin-top: 10px;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      display: block;
      text-align: center;
      background: #25D366;
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      border: 0;
      cursor: pointer;
    }

    .state {
      margin: 18px 15px;
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      text-align: center;
    }

    .state h2 {
      margin-top: 0;
      color: #14532d;
      font-size: 22px;
    }

    .state p {
      margin-bottom: 0;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>Bless Vegs</h1>
</header>

<div id="status" class="state hidden"></div>
<div class="grid" id="products"></div>

<script>
  const API = "https://blessvegs-backend.onrender.com/public/products";
  const PHONE = "31685122481";

  function formatEUR(n) {
    const value = Number(n || 0);
    return new Intl.NumberFormat("nl-NL", {
      style: "currency",
      currency: "EUR"
    }).format(value);
  }

  function showStatus(title, text) {
    const box = document.getElementById("status");
    box.classList.remove("hidden");
    box.innerHTML = `<h2>${title}</h2><p>${text}</p>`;
  }

  function clearStatus() {
    const box = document.getElementById("status");
    box.classList.add("hidden");
    box.innerHTML = "";
  }

  function createFallbackOption(p) {
    return {
      label: "per stuk",
      prijs: Number(p.kortingsprijs || p.prijs || 0)
    };
  }

  function createCard(p) {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("img");
    if (p.foto) {
      img.src = `images/${p.foto}`;
      img.alt = p.name || "Productfoto";
      img.onerror = () => {
        img.style.display = "none";
      };
    } else {
      img.style.display = "none";
    }

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = p.name || "Product";

    const price = document.createElement("div");
    price.className = "price";
    price.textContent = p.display_prijs_label || formatEUR(p.kortingsprijs || p.prijs || 0);

    const ref = document.createElement("div");
    ref.className = "ref";
    ref.textContent = p.display_referentieprijs_label || "";

    card.append(img, title, price);
    if (ref.textContent) card.appendChild(ref);

    const opties = Array.isArray(p.bestelopties) && p.bestelopties.length
      ? p.bestelopties
      : [createFallbackOption(p)];

    let selected = opties[0];

    if (opties.length > 1) {
      const optWrap = document.createElement("div");
      optWrap.className = "options";

      opties.forEach((opt) => {
        const b = document.createElement("button");
        b.type = "button";
        b.textContent = opt.label || "Optie";

        if (opt === selected) b.classList.add("active");

        b.onclick = () => {
          selected = opt;
          [...optWrap.children].forEach(x => x.classList.remove("active"));
          b.classList.add("active");
          total.textContent = formatEUR(opt.prijs);
        };

        optWrap.appendChild(b);
      });

      card.appendChild(optWrap);
    }

    const total = document.createElement("div");
    total.className = "total";
    total.textContent = formatEUR(selected.prijs);

    const btn = document.createElement("a");
    btn.className = "btn";
    btn.href = "#";
    btn.textContent = "Bestel via WhatsApp";

    btn.onclick = (e) => {
      e.preventDefault();
      const label = selected.label || "product";
      const productName = p.name || "product";
      const totaal = formatEUR(selected.prijs);
      const msg = `Goedenavond, ik wil graag ${label} ${productName} bestellen. Totaal: ${totaal}`;
      window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`, "_blank");
    };

    card.append(total, btn);
    return card;
  }

  async function load() {
    const root = document.getElementById("products");
    root.innerHTML = "";
    clearStatus();

    try {
      const res = await fetch(API, { cache: "no-store" });
      if (!res.ok) throw new Error("API gaf geen geldige response");

      const json = await res.json();
      const items = Array.isArray(json.data) ? json.data : [];

      if (!items.length) {
        showStatus(
          "Momenteel geen producten zichtbaar",
          "Er staan nu geen producten in het systeem. Voeg producten toe in de admin en ververs daarna de pagina."
        );
        return;
      }

      items.forEach((p) => {
        root.appendChild(createCard(p));
      });
    } catch (err) {
      console.error(err);
      showStatus(
        "Er ging iets mis",
        "De producten konden niet geladen worden. Probeer de pagina opnieuw te verversen."
      );
    }
  }

  load();
</script>

</body>
</html>
