<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bless Vegs</title>
  <meta name="theme-color" content="#14532d" />
  <link rel="manifest" href="/manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8f4;
      color: #1f2937;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #14532d;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-text {
      font-size: 2rem;
      text-align: center;
    }

    header {
      background: #14532d;
      color: white;
      padding: 24px 16px;
      text-align: center;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .intro {
      background: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .intro h2 {
      margin-top: 0;
    }

    .status {
      margin: 14px 0 20px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #e8f5e9;
      color: #14532d;
      font-weight: bold;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .price {
      font-size: 1.2rem;
      font-weight: bold;
      color: #14532d;
      margin-bottom: 8px;
    }

    .stock {
      color: #4b5563;
      margin-bottom: 12px;
    }

    .btn {
      display: inline-block;
      background: #14532d;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
    }

    .helpbox {
      margin-top: 28px;
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    footer {
      text-align: center;
      color: #6b7280;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="splash-text">🌱 Bless Vegs</div>
  </div>

  <header>
    <h1>🌿 Bless Vegs</h1>
    <p>Biologisch • Niet bespoten • Met liefde geteeld</p>
  </header>

  <main>
    <section class="intro">
      <h2>Vers uit onze tuin</h2>
      <p>Bestel je verse groenten eenvoudig via WhatsApp.</p>
    </section>

    <div id="status" class="status">Producten laden...</div>
    <section id="products" class="grid"></section>

    <section class="helpbox">
      <h2>Klantenservice</h2>
      <p>Vragen over bezorging, producten of bestellingen?</p>
      <a class="btn" href="https://wa.me/31685122481?text=Hallo%20Bless%20Vegs%2C%20ik%20heb%20een%20vraag.">Stuur een WhatsApp</a>
    </section>
  </main>

  <footer>
    Bless Vegs • WhatsApp: 0685122481
  </footer>

  <script>
    const splash = document.getElementById("splash");
    const statusBox = document.getElementById("status");
    const productsBox = document.getElementById("products");

    function hideSplash() {
      splash.classList.add("hidden");
      setTimeout(() => {
        splash.style.display = "none";
      }, 350);
    }

    function showError(message) {
      statusBox.textContent = message;
      statusBox.classList.add("error");
    }

    function renderProducts(items) {
      productsBox.innerHTML = "";

      if (!items || items.length === 0) {
        showError("Geen producten gevonden.");
        return;
      }

      statusBox.textContent = items.length + " product(en) geladen.";
      statusBox.classList.remove("error");

      items.forEach((p) => {
        const naam = p.name || "Product";
        const prijs = p.prijs ?? "";
        const voorraad = p.voorraad ?? "";
        const voorraadType = p.voorraad_type || "";
        const whatsappText = encodeURIComponent(
          `Hallo Bless Vegs, ik wil graag bestellen:\n- ${naam}\n- Prijs: €${prijs}`
        );

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h3>${naam}</h3>
          <div class="price">€${prijs}</div>
          <div class="stock">Voorraad: ${voorraad} ${voorraadType}</div>
          <a class="btn" href="https://wa.me/31685122481?text=${whatsappText}" target="_blank" rel="noopener noreferrer">Bestel via WhatsApp</a>
        `;
        productsBox.appendChild(card);
      });
    }

    async function loadProducts() {
      try {
        const supabase = window.supabase.createClient(
          'https://fzwvqptjhjlfrriyuqcp.supabase.co',
          'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6d3ZxcHRqaGpsZnJyaXl1cWNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNzQ5NjYsImV4cCI6MjA4OTY1MDk2Nn0.pxU7DNVn_WjyXjBg3KDq8A2oeVqir3_tKGtEQ61kJ4Q'
        );

        const { data, error } = await supabase
          .from('producten')
          .select('id, name, prijs, voorraad, voorraad_type')
          .order('id', { ascending: true });

        if (error) {
          console.error(error);
          showError("Fout bij laden van producten.");
          return;
        }

        renderProducts(data);
      } catch (err) {
        console.error(err);
        showError("Onverwachte fout tijdens laden.");
      } finally {
        hideSplash();
      }
    }

    window.addEventListener("load", () => {
      loadProducts();

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch((err) => {
          console.error("Service worker fout:", err);
        });
      }
    });
  </script>
</body>
</html>
