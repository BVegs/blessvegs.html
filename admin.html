<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bless Vegs Admin</title>
  <style>
    :root{
      --green:#14532d;
      --green-dark:#0f3f22;
      --bg:#f7f7f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --danger:#b91c1c;
      --danger-bg:#fef2f2;
      --success:#166534;
      --success-bg:#ecfdf5;
      --info:#1d4ed8;
      --info-bg:#eff6ff;
      --shadow:0 2px 10px rgba(0,0,0,0.08);
      --radius:14px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:16px;
    }

    .top{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .logo{
      width:72px;
      height:72px;
      object-fit:contain;
      border-radius:14px;
      background:#fff;
      padding:4px;
      box-shadow:var(--shadow);
    }

    .top h1{
      margin:0 0 4px;
      color:var(--green);
      font-size:34px;
      line-height:1.05;
    }

    .top p{
      margin:0;
      color:var(--muted);
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:16px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .card h2{
      margin:0 0 14px;
      color:var(--green);
      font-size:26px;
    }

    .card p{
      line-height:1.55;
    }

    label{
      display:block;
      font-weight:700;
      margin:14px 0 6px;
    }

    input, textarea, select{
      width:100%;
      padding:14px;
      border:1px solid var(--border);
      border-radius:12px;
      font:inherit;
      background:#fff;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:16px;
    }

    button, .link-btn{
      border:none;
      border-radius:12px;
      padding:13px 16px;
      font:inherit;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary{
      background:var(--green);
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      color:var(--green);
      border:1px solid var(--border);
    }

    .btn-danger{
      background:#fff;
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .notice{
      margin-top:14px;
      padding:14px;
      border-radius:12px;
      display:none;
      line-height:1.5;
    }

    .notice.show{display:block}
    .notice.error{background:var(--danger-bg); color:var(--danger)}
    .notice.success{background:var(--success-bg); color:var(--success)}
    .notice.info{background:var(--info-bg); color:var(--info)}

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .toolbar input{
      flex:1 1 220px;
    }

    .list{
      display:grid;
      gap:12px;
    }

    .product-item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      display:grid;
      gap:10px;
      background:#fff;
    }

    .product-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      flex-wrap:wrap;
    }

    .product-title{
      font-size:20px;
      font-weight:700;
      margin:0;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .product-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .price-line{
      font-weight:700;
      color:var(--green);
    }

    .hidden{display:none !important}

    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
    }

    @media (max-width: 560px){
      .row{grid-template-columns:1fr}
      .top h1{font-size:28px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <img class="logo" src="blessvegs-logo.png" alt="Bless Vegs logo" onerror="this.style.display='none';" />
      <div>
        <h1>Bless Vegs Admin</h1>
        <p>Veilige productbeheer omgeving</p>
      </div>
    </div>

    <div id="loginView" class="grid">
      <div class="card">
        <h2>Inloggen</h2>
        <label for="username">Gebruikersnaam</label>
        <input id="username" type="text" autocomplete="username" />

        <label for="password">Wachtwoord</label>
        <input id="password" type="password" autocomplete="current-password" />

        <div class="btns">
          <button id="loginBtn" class="btn-primary" type="button">Inloggen</button>
          <a class="link-btn btn-secondary" href="index.html">Naar site</a>
        </div>

        <div id="loginNotice" class="notice"></div>
      </div>

      <div class="card">
        <h2>Wat je hier doet</h2>
        <p>Hier beheer je je producten. Je kunt producten toevoegen, bewerken, verwijderen en daarna direct op de live site controleren.</p>
      </div>
    </div>

    <div id="adminView" class="hidden">
      <div class="grid">
        <div class="card">
          <h2 id="formTitle">Nieuw product toevoegen</h2>

          <label for="name">Productnaam</label>
          <input id="name" type="text" />

          <div class="row">
            <div>
              <label for="prijs">Prijs</label>
              <input id="prijs" type="number" step="0.01" min="0" />
            </div>
            <div>
              <label for="kortingsprijs">Kortingsprijs</label>
              <input id="kortingsprijs" type="number" step="0.01" min="0" />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="voorraad">Voorraad</label>
              <input id="voorraad" type="number" step="1" min="0" />
            </div>
            <div>
              <label for="voorraad_type">Voorraad type</label>
              <select id="voorraad_type">
                <option value="stuk">stuk</option>
                <option value="bos">bos</option>
                <option value="bakje">bakje</option>
              </select>
            </div>
          </div>

          <label for="beschrijving">Beschrijving</label>
          <textarea id="beschrijving"></textarea>

          <label for="foto">Fotobestandsnaam</label>
          <input id="foto" type="text" placeholder="bijv. amsoi.jpg" />

          <div class="btns">
            <button id="saveBtn" class="btn-primary" type="button">Opslaan</button>
            <button id="resetBtn" class="btn-secondary" type="button">Nieuw formulier</button>
            <button id="logoutBtn" class="btn-danger" type="button">Uitloggen</button>
          </div>

          <div id="formNotice" class="notice"></div>
        </div>

        <div class="card">
          <h2>Producten</h2>

          <div class="toolbar">
            <input id="searchInput" type="text" placeholder="Zoek product..." />
            <button id="refreshBtn" class="btn-secondary" type="button">Ververs producten</button>
            <a class="link-btn btn-secondary" href="index.html" target="_blank" rel="noopener">Bekijk live site</a>
          </div>

          <div id="listNotice" class="notice"></div>
          <div id="productList" class="list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = "https://blessvegs-backend.onrender.com";
    const TOKEN_KEY = "blessvegs_admin_token";

    const state = {
      token: localStorage.getItem(TOKEN_KEY) || "",
      editingId: null,
      allProducts: [],
      filteredProducts: []
    };

    const els = {
      loginView: document.getElementById("loginView"),
      adminView: document.getElementById("adminView"),
      loginNotice: document.getElementById("loginNotice"),
      formNotice: document.getElementById("formNotice"),
      listNotice: document.getElementById("listNotice"),
      username: document.getElementById("username"),
      password: document.getElementById("password"),
      loginBtn: document.getElementById("loginBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      formTitle: document.getElementById("formTitle"),
      name: document.getElementById("name"),
      prijs: document.getElementById("prijs"),
      kortingsprijs: document.getElementById("kortingsprijs"),
      voorraad: document.getElementById("voorraad"),
      voorraad_type: document.getElementById("voorraad_type"),
      beschrijving: document.getElementById("beschrijving"),
      foto: document.getElementById("foto"),
      saveBtn: document.getElementById("saveBtn"),
      resetBtn: document.getElementById("resetBtn"),
      refreshBtn: document.getElementById("refreshBtn"),
      searchInput: document.getElementById("searchInput"),
      productList: document.getElementById("productList")
    };

    function showNotice(el, text, type) {
      el.className = "notice show " + type;
      el.textContent = text;
    }

    function hideNotice(el) {
      el.className = "notice";
      el.textContent = "";
    }

    function setView(isLoggedIn) {
      els.loginView.classList.toggle("hidden", isLoggedIn);
      els.adminView.classList.toggle("hidden", !isLoggedIn);
    }

    function formatEUR(value) {
      const n = Number(value || 0);
      return new Intl.NumberFormat("nl-NL", { style: "currency", currency: "EUR" }).format(n);
    }

    function effectivePrice(product) {
      const normal = Number(product.prijs ?? product.basis_prijs ?? 0);
      const sale = Number(product.kortingsprijs ?? 0);
      return sale > 0 && sale < normal ? sale : normal;
    }

    function resetForm() {
      state.editingId = null;
      els.formTitle.textContent = "Nieuw product toevoegen";
      els.name.value = "";
      els.prijs.value = "";
      els.kortingsprijs.value = "";
      els.voorraad.value = "";
      els.voorraad_type.value = "stuk";
      els.beschrijving.value = "";
      els.foto.value = "";
      hideNotice(els.formNotice);
    }

    async function api(path, options = {}) {
      const headers = { ...(options.headers || {}) };

      if (state.token) {
        headers.Authorization = `Bearer ${state.token}`;
      }

      if (!headers["Content-Type"] && options.body) {
        headers["Content-Type"] = "application/json";
      }

      const res = await fetch(API + path, {
        ...options,
        headers
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok || json.ok === false) {
        const message = json.error || `Request mislukt (${res.status})`;
        throw new Error(message);
      }

      return json;
    }

    async function login() {
      hideNotice(els.loginNotice);

      const username = els.username.value.trim();
      const password = els.password.value;

      if (!username || !password) {
        showNotice(els.loginNotice, "Gebruikersnaam en wachtwoord zijn verplicht.", "error");
        return;
      }

      try {
        const json = await api("/admin/login", {
          method: "POST",
          body: JSON.stringify({ username, password })
        });

        state.token = json.token;
        localStorage.setItem(TOKEN_KEY, state.token);
        setView(true);
        showNotice(els.listNotice, "Inloggen gelukt.", "success");
        await loadProducts();
      } catch (error) {
        showNotice(els.loginNotice, error.message, "error");
      }
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      state.token = "";
      setView(false);
      showNotice(els.loginNotice, "Je bent uitgelogd.", "info");
    }

    function formPayload() {
      return {
        name: els.name.value.trim(),
        prijs: Number(els.prijs.value || 0),
        basis_prijs: Number(els.prijs.value || 0),
        kortingsprijs: els.kortingsprijs.value === "" ? 0 : Number(els.kortingsprijs.value),
        voorraad: Number(els.voorraad.value || 0),
        voorraad_aantal: Number(els.voorraad.value || 0),
        voorraad_type: els.voorraad_type.value,
        voorraad_eenheid: els.voorraad_type.value,
        verkoop_type: "stuk",
        basis_eenheid: els.voorraad_type.value,
        minimum_bestelhoeveelheid: 1,
        stapgrootte: 1,
        beschrijving: els.beschrijving.value.trim(),
        foto: els.foto.value.trim()
      };
    }

    async function saveProduct() {
      hideNotice(els.formNotice);

      const payload = formPayload();

      if (!payload.name) {
        showNotice(els.formNotice, "Productnaam is verplicht.", "error");
        return;
      }

      if (payload.prijs < 0 || payload.voorraad < 0) {
        showNotice(els.formNotice, "Prijs en voorraad moeten 0 of hoger zijn.", "error");
        return;
      }

      if (payload.kortingsprijs > 0 && payload.kortingsprijs >= payload.prijs) {
        showNotice(els.formNotice, "Kortingsprijs moet lager zijn dan de gewone prijs.", "error");
        return;
      }

      try {
        if (state.editingId) {
          await api(`/admin/products/${state.editingId}`, {
            method: "PUT",
            body: JSON.stringify(payload)
          });
          showNotice(els.formNotice, "Product bijgewerkt.", "success");
        } else {
          await api("/admin/products", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          showNotice(els.formNotice, "Product toegevoegd.", "success");
        }

        await loadProducts();
        resetForm();
      } catch (error) {
        showNotice(els.formNotice, error.message, "error");
      }
    }

    function renderProducts() {
      els.productList.innerHTML = "";

      if (!state.filteredProducts.length) {
        els.productList.innerHTML = `<div class="muted">Geen producten gevonden.</div>`;
        return;
      }

      state.filteredProducts.forEach((product) => {
        const item = document.createElement("div");
        item.className = "product-item";

        const title = product.name || "Product";
        const normal = Number(product.prijs ?? product.basis_prijs ?? 0);
        const sale = Number(product.kortingsprijs ?? 0);
        const activePrice = effectivePrice(product);

        const desc = product.beschrijving || "";
        const foto = product.foto || "-";
        const voorraad = product.voorraad ?? product.voorraad_aantal ?? 0;
        const type = product.voorraad_type || product.voorraad_eenheid || "stuk";

        item.innerHTML = `
          <div class="product-head">
            <div>
              <div class="product-title">${title}</div>
              <div class="muted">Voorraad: ${voorraad} ${type}</div>
            </div>
            <div class="product-actions">
              <button class="btn-secondary" data-action="edit" data-id="${product.id}">Bewerken</button>
              <button class="btn-danger" data-action="delete" data-id="${product.id}">Verwijderen</button>
            </div>
          </div>
          <div class="price-line">
            ${sale > 0 && sale < normal ? `<span style="text-decoration:line-through;color:#6b7280;font-size:14px;">${formatEUR(normal)}</span>` : ""}
            <span>${formatEUR(activePrice)}</span>
          </div>
          <div class="muted">${desc || "Geen beschrijving"}</div>
          <div class="muted">Foto: ${foto}</div>
        `;

        els.productList.appendChild(item);
      });
    }

    function applySearch() {
      const q = els.searchInput.value.trim().toLowerCase();

      if (!q) {
        state.filteredProducts = [...state.allProducts];
        renderProducts();
        return;
      }

      state.filteredProducts = state.allProducts.filter((p) => {
        return [
          p.name,
          p.beschrijving,
          p.foto,
          p.voorraad_type
        ].join(" ").toLowerCase().includes(q);
      });

      renderProducts();
    }

    async function loadProducts() {
      hideNotice(els.listNotice);

      try {
        const json = await api("/admin/products");
        state.allProducts = Array.isArray(json.data) ? json.data : [];
        state.filteredProducts = [...state.allProducts];
        renderProducts();
      } catch (error) {
        showNotice(els.listNotice, error.message, "error");
      }
    }

    function fillForm(product) {
      state.editingId = product.id;
      els.formTitle.textContent = "Product bewerken";
      els.name.value = product.name || "";
      els.prijs.value = product.prijs ?? product.basis_prijs ?? "";
      els.kortingsprijs.value = Number(product.kortingsprijs || 0) > 0 ? product.kortingsprijs : "";
      els.voorraad.value = product.voorraad ?? product.voorraad_aantal ?? "";
      els.voorraad_type.value = product.voorraad_type || product.voorraad_eenheid || "stuk";
      els.beschrijving.value = product.beschrijving || "";
      els.foto.value = product.foto || "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteProduct(id) {
      if (!confirm("Weet je zeker dat je dit product wilt verwijderen?")) {
        return;
      }

      try {
        await api(`/admin/products/${id}`, { method: "DELETE" });
        showNotice(els.listNotice, "Product verwijderd.", "success");
        if (state.editingId === id) resetForm();
        await loadProducts();
      } catch (error) {
        showNotice(els.listNotice, error.message, "error");
      }
    }

    els.loginBtn.addEventListener("click", login);
    els.password.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
    els.logoutBtn.addEventListener("click", logout);
    els.saveBtn.addEventListener("click", saveProduct);
    els.resetBtn.addEventListener("click", resetForm);
    els.refreshBtn.addEventListener("click", loadProducts);
    els.searchInput.addEventListener("input", applySearch);

    els.productList.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;

      const id = Number(btn.dataset.id);
      const action = btn.dataset.action;
      const product = state.allProducts.find((p) => Number(p.id) === id);

      if (action === "edit" && product) fillForm(product);
      if (action === "delete" && Number.isFinite(id)) deleteProduct(id);
    });

    async function bootstrap() {
      if (!state.token) {
        setView(false);
        return;
      }

      setView(true);

      try {
        await loadProducts();
      } catch {
        logout();
      }
    }

    bootstrap();
  </script>
</body>
</html>
